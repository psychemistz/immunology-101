exercises:
  - id: "08_mc_neoantigen"
    type: "multiple_choice"
    difficulty: "easy"
    question: "What are tumour neoantigens?"
    choices:
      - "A) Normal proteins found on all cells"
      - "B) Mutated proteins unique to the tumour, presented on MHC class I"
      - "C) Antibodies produced against tumours"
      - "D) Cytokines released by tumour cells"
    answer: "B"
    hint: "Neo = new. These arise from somatic mutations specific to the tumour."
    explanation: >
      Neoantigens are novel peptides generated by somatic mutations in the
      tumour. When processed and presented on MHC class I, they can be
      recognised by CD8⁺ T cells as foreign. Neoantigens are the most specific
      targets for anti-tumour immunity and are central to personalised
      cancer immunotherapy.
    tags: ["neoantigen", "tumour"]

  - id: "08_mc_pdl1"
    type: "multiple_choice"
    difficulty: "easy"
    question: "How does tumour PD-L1 expression help cancer cells evade the immune system?"
    choices:
      - "A) It activates NK cells to kill the tumour"
      - "B) It engages PD-1 on T cells, inhibiting their anti-tumour activity"
      - "C) It promotes antibody production"
      - "D) It enhances MHC class I expression"
    answer: "B"
    hint: "PD-1/PD-L1 is a checkpoint — an immune 'brake'. The tumour is pressing the brake pedal."
    explanation: >
      PD-L1 on tumour cells binds PD-1 on T cells, delivering an inhibitory
      signal that causes T cell exhaustion — reduced proliferation, cytokine
      production, and killing capacity. Checkpoint inhibitors (anti-PD-1 or
      anti-PD-L1) block this interaction, restoring T cell function.
    tags: ["PD-1", "PD-L1", "checkpoint"]

  - id: "08_matching_evasion"
    type: "matching"
    difficulty: "medium"
    question: "Match each tumour evasion mechanism to its description:"
    left_items:
      - "MHC I downregulation"
      - "Treg recruitment"
      - "Immunosuppressive cytokines (TGF-β)"
      - "Neoantigen loss"
    right_items:
      - "Hides tumour antigens from CD8+ T cell recognition"
      - "Suppresses anti-tumour T cells in the microenvironment"
      - "Dampens immune activation broadly"
      - "Immune editing removes the most immunogenic mutations"
    answer:
      "MHC I downregulation": "Hides tumour antigens from CD8+ T cell recognition"
      "Treg recruitment": "Suppresses anti-tumour T cells in the microenvironment"
      "Immunosuppressive cytokines (TGF-β)": "Dampens immune activation broadly"
      "Neoantigen loss": "Immune editing removes the most immunogenic mutations"
    hint: "MHC I loss = hiding identity; Tregs = recruited suppressors; TGF-β = general dampener; neoantigen loss = removing the target."
    explanation: >
      Tumours employ multiple evasion strategies simultaneously. MHC I
      downregulation prevents T cell recognition. Treg recruitment creates
      a local immunosuppressive environment. TGF-β broadly dampens immune
      function. Neoantigen loss through immune editing removes the very
      mutations that T cells were targeting.
    tags: ["evasion", "matching"]

  - id: "08_fill_checkpoint"
    type: "fill_in_the_blank"
    difficulty: "medium"
    question: "Immune ____ inhibitors like pembrolizumab block the PD-1/PD-L1 axis to restore anti-tumour T cell activity."
    answer: "checkpoint"
    hint: "These drugs release the 'brakes' on the immune response."
    explanation: >
      Immune checkpoint inhibitors block inhibitory receptors (PD-1, CTLA-4)
      that normally prevent excessive immune activation. In the tumour context,
      these checkpoints are hijacked to suppress anti-tumour immunity.
      Blocking them restores T cell function and can lead to durable tumour
      regression.
    tags: ["checkpoint inhibitor", "immunotherapy"]

  - id: "08_ordering_three_es"
    type: "ordering"
    difficulty: "medium"
    question: "Arrange the phases of cancer immunoediting (the Three Es) in order:"
    choices:
      - "Immune system detects and destroys nascent tumour cells (elimination)"
      - "Surviving variants are held in check by ongoing immune pressure (equilibrium)"
      - "Tumour acquires mutations that allow it to evade immune detection"
      - "Immune-evasive tumour grows unchecked (escape)"
      - "Clinically detectable cancer develops"
      - "Immunotherapy may attempt to restore immune control"
    answer:
      - "Immune system detects and destroys nascent tumour cells (elimination)"
      - "Surviving variants are held in check by ongoing immune pressure (equilibrium)"
      - "Tumour acquires mutations that allow it to evade immune detection"
      - "Immune-evasive tumour grows unchecked (escape)"
      - "Clinically detectable cancer develops"
      - "Immunotherapy may attempt to restore immune control"
    hint: "Elimination → equilibrium → escape → clinical cancer → treatment intervention."
    explanation: >
      Cancer immunoediting describes the dynamic interaction between the immune
      system and developing tumours. Initial elimination may succeed, but
      surviving variants face selective pressure during equilibrium. Eventually,
      immune-evasive clones may escape, leading to clinical cancer.
      Immunotherapy attempts to re-engage the immune system against these
      escaped tumours.
    tags: ["immunoediting", "three Es", "ordering"]

  - id: "08_case_tme"
    type: "case_study"
    difficulty: "hard"
    question: >
      You perform CIBERSORTx deconvolution on bulk RNA-seq from 200 melanoma
      patients and correlate immune cell fractions with checkpoint inhibitor
      response. You find that patients with high CD8⁺ T cell and M1 macrophage
      fractions respond well, while those with high Treg and M2 macrophage
      fractions do not.

      Explain the biological basis for this association. What additional
      spatial information might improve prediction?
    answer:
      - "hot tumour"
      - "cold tumour"
      - "CD8"
      - "Treg"
      - "immunosuppressive"
      - "spatial"
      - "infiltration"
      - "proximity"
    hint: "CD8⁺ + M1 = hot tumour (inflamed). Tregs + M2 = cold/suppressed tumour."
    explanation: >
      High CD8⁺ T cells and M1 macrophages indicate a "hot" tumour
      microenvironment with active anti-tumour immunity — checkpoint
      inhibitors can release the brakes on these already-present effectors.
      Conversely, Tregs and M2 macrophages create an immunosuppressive TME
      where checkpoint inhibitors alone are insufficient. Spatial information
      (e.g., from spatial transcriptomics or multiplex imaging) could reveal
      whether CD8⁺ T cells are at the tumour margin or infiltrating the core,
      and their proximity to PD-L1⁺ tumour cells — both strong predictors
      of checkpoint response.
    tags: ["case study", "CIBERSORTx", "TME", "immunotherapy"]

  - id: "08_mc_car_t"
    type: "multiple_choice"
    difficulty: "medium"
    question: "CAR-T cell therapy involves:"
    choices:
      - "A) Injecting naked mRNA into the tumour"
      - "B) Engineering a patient's T cells to express a synthetic receptor targeting a tumour antigen"
      - "C) Blocking PD-1 with a monoclonal antibody"
      - "D) Transferring B cells from a healthy donor"
    answer: "B"
    hint: "CAR = Chimeric Antigen Receptor. The T cell is custom-built to target a specific vulnerability."
    explanation: >
      CAR-T therapy harvests a patient's T cells, engineers them to express a
      chimeric antigen receptor (combining an antibody-derived binding domain
      with T cell signalling domains), expands them ex vivo, and re-infuses
      them. The CAR enables MHC-independent recognition of tumour surface
      antigens (e.g., CD19 for B cell lymphomas). It has shown remarkable
      efficacy in certain blood cancers.
    tags: ["CAR-T", "immunotherapy"]

  - id: "08_mc_hot_cold"
    type: "multiple_choice"
    difficulty: "hard"
    question: "A 'cold' tumour is unlikely to respond to checkpoint inhibitor monotherapy because:"
    choices:
      - "A) It has too many neoantigens"
      - "B) It lacks significant T cell infiltration, so there are no T cells to 'release the brakes' on"
      - "C) It expresses too much MHC class I"
      - "D) It has an active Th1 response that doesn't need boosting"
    answer: "B"
    hint: "Checkpoint inhibitors release brakes on T cells — but if there are no T cells present, there's nothing to unleash."
    explanation: >
      Cold tumours have minimal T cell infiltration, meaning checkpoint
      inhibitors have few or no effector T cells to reinvigorate. These
      tumours may need combination strategies: radiation or chemotherapy
      to induce immunogenic cell death, oncolytic viruses to inflame the
      TME, or STING agonists to recruit T cells before checkpoint blockade
      can be effective. Converting cold tumours to hot ones is a major focus
      of current immunotherapy research.
    tags: ["hot tumour", "cold tumour", "checkpoint"]

  - id: "08_fill_missing_self"
    type: "fill_in_the_blank"
    difficulty: "easy"
    question: "NK cells kill tumour cells that downregulate ____ class I molecules through 'missing self' recognition."
    answer: "MHC"
    hint: "When cells lose their 'identity badge', NK cells detect the absence — anomaly detection for missing expected headers."
    explanation: >
      NK cells are activated when target cells lack MHC class I expression
      ('missing self' hypothesis). Since many tumours downregulate MHC I to
      escape CD8+ T cell recognition, they become vulnerable to NK cell killing
      instead. This creates a complementary surveillance system: CD8+ T cells
      handle MHC I-expressing targets, NK cells handle MHC I-deficient targets.
    tags: ["NK cell", "missing self", "MHC"]

  - id: "08_matching_immunotherapies"
    type: "matching"
    difficulty: "hard"
    question: "Match each immunotherapy approach to its mechanism of action:"
    left_items:
      - "Anti-PD-1 (pembrolizumab)"
      - "Anti-CTLA-4 (ipilimumab)"
      - "CAR-T cells"
      - "Bispecific antibodies"
      - "Cancer vaccines"
    right_items:
      - "Block exhaustion checkpoint to restore effector T cell activity"
      - "Enhance T cell priming by removing co-inhibitory brake during activation"
      - "Engineered T cells with synthetic receptors for MHC-independent tumour killing"
      - "Bridge T cells directly to tumour cells via dual-specificity binding"
      - "Prime new immune responses against tumour-specific antigens"
    answer:
      "Anti-PD-1 (pembrolizumab)": "Block exhaustion checkpoint to restore effector T cell activity"
      "Anti-CTLA-4 (ipilimumab)": "Enhance T cell priming by removing co-inhibitory brake during activation"
      "CAR-T cells": "Engineered T cells with synthetic receptors for MHC-independent tumour killing"
      "Bispecific antibodies": "Bridge T cells directly to tumour cells via dual-specificity binding"
      "Cancer vaccines": "Prime new immune responses against tumour-specific antigens"
    hint: "PD-1 = effector brake, CTLA-4 = priming brake, CAR-T = custom weapon, bispecific = adapter, vaccine = training."
    explanation: >
      Each immunotherapy targets a different step in anti-tumour immunity.
      Anti-PD-1 reinvigorates exhausted T cells in the tumour. Anti-CTLA-4
      enhances initial T cell priming in lymph nodes. CAR-T provides engineered
      effectors. Bispecifics physically bridge T cells to tumour cells.
      Cancer vaccines train new T cell responses against tumour antigens.
      Combination approaches targeting multiple steps show the greatest promise.
    tags: ["immunotherapy", "matching"]

  - id: "08_case_tmb"
    type: "case_study"
    difficulty: "medium"
    question: >
      You calculate tumour mutational burden (TMB) from whole-exome sequencing
      of 100 lung cancer patients. Patients with TMB > 10 mutations/Mb show
      significantly better responses to anti-PD-1 therapy than those with
      low TMB.

      Why would a higher mutational burden predict better response to
      checkpoint inhibitors?
    answer:
      - "neoantigen"
      - "mutation"
      - "CD8"
      - "T cell"
      - "recognition"
      - "immunogenic"
    hint: "More mutations = more potential neoantigens = more targets for T cells to recognise."
    explanation: >
      Higher TMB means more somatic mutations, increasing the probability of
      generating immunogenic neoantigens presented on MHC class I. More
      neoantigens provide more targets for CD8+ T cells, resulting in a
      larger pre-existing anti-tumour T cell response that can be unleashed
      by checkpoint inhibitors. Low TMB tumours generate fewer neoantigens,
      making them less visible to the immune system and less responsive to
      checkpoint blockade. TMB is now an FDA-approved biomarker for
      pembrolizumab across solid tumours.
    tags: ["case study", "TMB", "biomarker"]
