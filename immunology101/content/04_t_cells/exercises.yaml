exercises:
  - id: "04_mc_two_signal"
    type: "multiple_choice"
    difficulty: "easy"
    question: "What happens when a T cell receives Signal 1 (TCR engagement) but NOT Signal 2 (co-stimulation)?"
    choices:
      - "A) The T cell activates normally"
      - "B) The T cell becomes anergic (unresponsive)"
      - "C) The T cell switches to a B cell"
      - "D) The T cell immediately undergoes apoptosis"
    answer: "B"
    hint: "Authentication without authorisation — access denied, account locked."
    explanation: >
      Without co-stimulation (Signal 2), TCR engagement alone leads to anergy —
      a state of functional unresponsiveness. This is a key peripheral tolerance
      mechanism that prevents T cells from attacking self-tissues that lack
      co-stimulatory molecules.
    tags: ["T cell", "activation", "anergy"]

  - id: "04_mc_cd8_killing"
    type: "multiple_choice"
    difficulty: "easy"
    question: "CD8+ cytotoxic T cells kill target cells primarily through which mechanism?"
    choices:
      - "A) Antibody secretion"
      - "B) Complement activation"
      - "C) Perforin/granzyme-mediated apoptosis"
      - "D) Phagocytosis"
    answer: "C"
    hint: "Perforin makes holes, granzymes enter and trigger cell death — exploit + payload."
    explanation: >
      CD8+ CTLs kill via the perforin/granzyme pathway: perforin forms pores
      in the target cell membrane, and granzymes (serine proteases) enter to
      activate caspases and trigger apoptosis. The Fas/FasL pathway is a
      secondary killing mechanism.
    tags: ["CD8", "CTL", "perforin", "granzyme"]

  - id: "04_matching_cd4_subsets"
    type: "matching"
    difficulty: "medium"
    question: "Match each CD4+ T helper subset to its key cytokine and target:"
    left_items:
      - "Th1"
      - "Th2"
      - "Th17"
      - "Treg"
    right_items:
      - "IFN-γ — activates macrophages against intracellular pathogens"
      - "IL-4 — drives anti-parasite and allergic responses"
      - "IL-17 — recruits neutrophils against extracellular bacteria"
      - "IL-10 — suppresses immune responses to maintain tolerance"
    answer:
      "Th1": "IFN-γ — activates macrophages against intracellular pathogens"
      "Th2": "IL-4 — drives anti-parasite and allergic responses"
      "Th17": "IL-17 — recruits neutrophils against extracellular bacteria"
      "Treg": "IL-10 — suppresses immune responses to maintain tolerance"
    hint: "Th1 = intracellular threats, Th2 = parasites/allergy, Th17 = extracellular bugs, Treg = suppression."
    explanation: >
      Each Th subset is polarised by specific cytokines and targets different
      threats. Th1 (IFN-γ) fights intracellular pathogens. Th2 (IL-4/5/13)
      fights helminths and drives allergy. Th17 (IL-17) recruits neutrophils
      against extracellular bacteria and fungi. Tregs (IL-10, TGF-β) suppress
      excessive responses.
    tags: ["Th subset", "cytokine", "matching"]

  - id: "04_fill_thymus"
    type: "fill_in_the_blank"
    difficulty: "medium"
    question: "During T cell development, thymocytes that bind self-peptide/MHC too strongly are eliminated by ____ selection."
    answer: "negative"
    hint: "This process removes self-reactive T cells — like a security audit rejecting dangerous inputs."
    explanation: >
      Negative selection eliminates thymocytes with high affinity for
      self-peptide/MHC complexes, preventing autoimmune T cells from reaching
      the periphery. This occurs primarily in the thymic medulla, where the
      transcription factor AIRE drives expression of tissue-specific antigens.
    tags: ["thymus", "negative selection", "tolerance"]

  - id: "04_ordering_activation"
    type: "ordering"
    difficulty: "medium"
    question: "Arrange the steps of naive CD8+ T cell activation and killing in order:"
    choices:
      - "Dendritic cell presents antigen on MHC class I to the TCR"
      - "Co-stimulatory signal (B7-CD28) confirms activation"
      - "T cell proliferates and differentiates into effector CTLs"
      - "CTL recognises the same peptide-MHC I on an infected cell"
      - "CTL releases perforin and granzymes toward the target"
      - "Target cell undergoes apoptosis"
    answer:
      - "Dendritic cell presents antigen on MHC class I to the TCR"
      - "Co-stimulatory signal (B7-CD28) confirms activation"
      - "T cell proliferates and differentiates into effector CTLs"
      - "CTL recognises the same peptide-MHC I on an infected cell"
      - "CTL releases perforin and granzymes toward the target"
      - "Target cell undergoes apoptosis"
    hint: "Priming → expansion → surveillance → kill. Like training a model, then deploying it."
    explanation: >
      CD8+ T cell activation follows: DC priming (Signal 1 + 2) → clonal
      expansion → effector CTL generation → target recognition → cytotoxic
      granule release → target apoptosis. The priming phase takes days, but
      once activated, CTLs kill efficiently and sequentially.
    tags: ["CD8", "activation", "ordering"]

  - id: "04_case_neoantigen"
    type: "case_study"
    difficulty: "hard"
    question: >
      You are building a neoantigen prediction pipeline for a melanoma patient.
      You identify a somatic mutation (V600E in BRAF) and want to predict
      whether the mutant peptide will be presented by the patient's MHC class I
      molecules.

      What patient-specific information do you need? Why does MHC class I
      presentation matter for CD8+ T cell recognition?
    answer:
      - "HLA"
      - "genotype"
      - "MHC class I"
      - "peptide binding"
      - "CD8"
      - "neoantigen"
    hint: "MHC class I molecules are highly polymorphic — each patient has different alleles (HLA type)."
    explanation: >
      You need the patient's HLA class I genotype (HLA-A, -B, -C alleles),
      as MHC I molecules are highly polymorphic and each allele binds a
      different set of peptides. Tools like NetMHCpan predict binding affinity
      between mutant peptides and specific HLA alleles. MHC class I
      presentation is essential because CD8+ CTLs only recognise peptides in
      the context of MHC I — without presentation, the mutation is invisible
      to the cytotoxic immune response, regardless of its oncogenic importance.
    tags: ["case study", "neoantigen", "HLA", "MHC"]

  - id: "04_mc_tcr_vs_bcr"
    type: "multiple_choice"
    difficulty: "medium"
    question: "Which is a key difference between the T cell receptor (TCR) and B cell receptor (BCR)?"
    choices:
      - "A) TCRs can be secreted as soluble molecules; BCRs cannot"
      - "B) TCRs undergo somatic hypermutation; BCRs do not"
      - "C) TCRs are always membrane-bound and recognise peptide+MHC; BCRs can be secreted as antibodies"
      - "D) TCRs only use V and J segments; BCRs use V, D, and J"
    answer: "C"
    hint: "TCRs check both payload (peptide) AND source address (MHC) — like an ACL rule."
    explanation: >
      Unlike BCRs/antibodies, TCRs are never secreted — they are always
      membrane-bound. TCRs recognise peptide in the context of MHC (MHC
      restriction), while antibodies can bind free-floating antigens directly.
      Additionally, TCRs do not undergo somatic hypermutation, so their
      affinity is fixed after thymic selection.
    tags: ["TCR", "BCR", "comparison"]

  - id: "04_mc_positive_selection"
    type: "multiple_choice"
    difficulty: "hard"
    question: "A double-positive thymocyte fails positive selection. What is the most likely reason and outcome?"
    choices:
      - "A) Its TCR bound self-MHC too strongly; the cell becomes a Treg"
      - "B) Its TCR could not bind self-MHC at all; the cell dies by neglect"
      - "C) Its TCR recognised a pathogen; the cell is exported immediately"
      - "D) Its TCR was already secreted as an antibody; the cell is redundant"
    answer: "B"
    hint: "Positive selection tests whether the TCR can even interact with the MHC system — like an integration test."
    explanation: >
      Positive selection requires that the TCR bind self-MHC with moderate
      affinity — proving it can 'see' the MHC system. Thymocytes whose
      TCRs fail to bind self-MHC receive no survival signals and die by
      neglect (apoptosis). This eliminates useless receptors. Cells that
      bind too strongly are eliminated by negative selection instead.
    tags: ["positive selection", "thymus", "development"]

  - id: "04_fill_thymus"
    type: "fill_in_the_blank"
    difficulty: "easy"
    question: "T cells develop in the ____, an organ in the chest where they undergo selection to ensure self-tolerance and MHC restriction."
    answer: "thymus"
    hint: "The 'T' in T cell comes from this organ — a CI/CD pipeline where most builds fail."
    explanation: >
      The thymus is the primary lymphoid organ for T cell development. About
      95% of developing thymocytes die during selection. Positive selection
      ensures MHC restriction, and negative selection removes self-reactive
      cells. The thymus involutes (shrinks) with age, contributing to
      immunosenescence.
    tags: ["thymus", "development"]

  - id: "04_matching_development_stages"
    type: "matching"
    difficulty: "hard"
    question: "Match each T cell development stage to the key event that occurs:"
    left_items:
      - "Double-negative (DN)"
      - "Double-positive (DP)"
      - "Positive selection"
      - "Negative selection"
      - "Single-positive (SP)"
    right_items:
      - "TCR β chain gene rearrangement begins"
      - "Both CD4 and CD8 expressed; TCR α chain rearranged"
      - "TCR must bind self-MHC with moderate affinity to survive"
      - "TCR must NOT bind self-peptide/MHC too strongly"
      - "Cell commits to CD4+ or CD8+ lineage and exits thymus"
    answer:
      "Double-negative (DN)": "TCR β chain gene rearrangement begins"
      "Double-positive (DP)": "Both CD4 and CD8 expressed; TCR α chain rearranged"
      "Positive selection": "TCR must bind self-MHC with moderate affinity to survive"
      "Negative selection": "TCR must NOT bind self-peptide/MHC too strongly"
      "Single-positive (SP)": "Cell commits to CD4+ or CD8+ lineage and exits thymus"
    hint: "Follow the pipeline: build (DN) → test compatibility (DP) → integration test → security audit → deploy."
    explanation: >
      T cell development proceeds through defined stages: DN (TCRβ rearrangement)
      → DP (TCRα rearrangement, both co-receptors) → positive selection (MHC
      compatibility check in cortex) → negative selection (self-reactivity
      check in medulla) → SP (lineage commitment to CD4 or CD8, export to
      periphery). Each stage filters the repertoire further.
    tags: ["development", "thymus", "matching"]

  - id: "04_case_subset_clustering"
    type: "case_study"
    difficulty: "medium"
    question: >
      You analyse scRNA-seq data from a lymph node and identify four distinct
      T cell clusters after subsetting on CD3E+ cells. Cluster A expresses
      CD4, TBX21, and IFNG. Cluster B expresses CD4, GATA3, and IL4. Cluster C
      expresses CD4, FOXP3, and IL2RA. Cluster D expresses CD4 and IL21.

      Identify each cluster's T helper subset and explain what each one does.
    answer:
      - "Th1"
      - "Th2"
      - "Treg"
      - "Tfh"
      - "IFN-gamma"
      - "IL-4"
      - "FOXP3"
    hint: "TBX21 = T-bet (master TF for Th1). GATA3 = Th2. FOXP3 = Treg. IL-21 = Tfh."
    explanation: >
      Cluster A (TBX21, IFNG) = Th1 cells, which activate macrophages against
      intracellular pathogens. Cluster B (GATA3, IL4) = Th2 cells, which drive
      anti-parasite and allergic responses. Cluster C (FOXP3, IL2RA) = Tregs,
      which suppress excessive immune responses. Cluster D (IL21) = Tfh cells,
      which provide help to B cells in germinal centres. Each subset is defined
      by its master transcription factor and cytokine profile.
    tags: ["case study", "scRNA-seq", "Th subsets"]
