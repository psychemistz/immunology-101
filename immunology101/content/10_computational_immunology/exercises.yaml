exercises:
  - id: "10_mc_deconvolution"
    type: "multiple_choice"
    difficulty: "easy"
    question: "What does immune deconvolution of bulk RNA-seq estimate?"
    choices:
      - "A) The sequence of antibodies in the sample"
      - "B) The proportions of different immune cell types in the tissue"
      - "C) The phylogenetic tree of pathogens"
      - "D) The binding affinity of peptides to MHC molecules"
    answer: "B"
    hint: "Deconvolution 'unmixes' the bulk signal to estimate cell type fractions."
    explanation: >
      Immune deconvolution algorithms (CIBERSORTx, MCP-counter, TIMER) use
      reference gene expression signatures to estimate the proportion of
      different immune cell types in a bulk RNA-seq sample. This is critical
      when single-cell resolution is unavailable.
    tags: ["deconvolution", "bulk RNA-seq"]

  - id: "10_mc_neoantigen_pipeline"
    type: "multiple_choice"
    difficulty: "easy"
    question: "Which of the following is NOT a typical step in a neoantigen prediction pipeline?"
    choices:
      - "A) Somatic variant calling from tumour WES/WGS"
      - "B) HLA genotyping of the patient"
      - "C) Predicting peptide-MHC binding affinity"
      - "D) Measuring serum cholesterol levels"
    answer: "D"
    hint: "Neoantigen prediction requires mutations, HLA type, and binding prediction — all immune-related data."
    explanation: >
      A neoantigen pipeline requires: (1) somatic variant calling to identify
      tumour-specific mutations, (2) HLA typing to determine the patient's
      MHC alleles, and (3) peptide-MHC binding prediction to rank which
      mutant peptides will be presented. Serum cholesterol is irrelevant
      to antigen presentation.
    tags: ["neoantigen", "pipeline"]

  - id: "10_matching_tools"
    type: "matching"
    difficulty: "medium"
    question: "Match each computational immunology task to its primary tool:"
    left_items:
      - "Immune cell deconvolution from bulk RNA-seq"
      - "Peptide-MHC binding prediction"
      - "Cell-cell communication inference from scRNA-seq"
      - "BCR/TCR repertoire analysis"
    right_items:
      - "CIBERSORTx"
      - "NetMHCpan"
      - "CellChat"
      - "Immcantation"
    answer:
      "Immune cell deconvolution from bulk RNA-seq": "CIBERSORTx"
      "Peptide-MHC binding prediction": "NetMHCpan"
      "Cell-cell communication inference from scRNA-seq": "CellChat"
      "BCR/TCR repertoire analysis": "Immcantation"
    hint: "Each tool specialises in one domain: deconvolution, binding, communication, or repertoire."
    explanation: >
      CIBERSORTx estimates cell fractions from bulk expression. NetMHCpan
      predicts peptide-MHC binding for neoantigen identification. CellChat
      infers ligand-receptor interactions from scRNA-seq. Immcantation
      provides a comprehensive framework for BCR/TCR repertoire analysis
      including clonal lineage reconstruction.
    tags: ["tools", "matching"]

  - id: "10_fill_spatial"
    type: "fill_in_the_blank"
    difficulty: "medium"
    question: "____ transcriptomics measures gene expression while preserving the spatial location of cells within tissue sections."
    answer: "Spatial"
    hint: "This technology adds the 'where' dimension to the 'what' of expression profiling."
    explanation: >
      Spatial transcriptomics (e.g., Visium, MERFISH, Slide-seq) captures
      gene expression data with spatial coordinates, enabling analysis of
      tissue architecture, cell neighbourhood composition, and spatially
      variable genes. In immunology, this reveals how immune cells are
      organised relative to tumour cells, sites of infection, or autoimmune
      lesions.
    tags: ["spatial transcriptomics"]

  - id: "10_ordering_scrna_pipeline"
    type: "ordering"
    difficulty: "medium"
    question: "Arrange the steps of a scRNA-seq immune cell type annotation pipeline in order:"
    choices:
      - "Generate raw count matrix from sequencing reads"
      - "Quality control: filter low-quality cells and genes"
      - "Normalise and log-transform expression values"
      - "Perform dimensionality reduction (PCA) and clustering"
      - "Identify marker genes for each cluster"
      - "Annotate clusters as immune cell types using known markers"
    answer:
      - "Generate raw count matrix from sequencing reads"
      - "Quality control: filter low-quality cells and genes"
      - "Normalise and log-transform expression values"
      - "Perform dimensionality reduction (PCA) and clustering"
      - "Identify marker genes for each cluster"
      - "Annotate clusters as immune cell types using known markers"
    hint: "Raw data → QC → normalise → cluster → markers → annotation. Standard scRNA-seq pipeline."
    explanation: >
      The scRNA-seq analysis pipeline proceeds: raw counts → QC filtering
      (remove doublets, dead cells) → normalisation → PCA and clustering
      (Leiden/Louvain) → differential expression to find marker genes →
      cell type annotation using canonical immune markers (CD3 for T cells,
      CD19 for B cells, etc.).
    tags: ["scRNA-seq", "pipeline", "ordering"]

  - id: "10_case_integrative"
    type: "case_study"
    difficulty: "hard"
    question: >
      You are designing a computational immunology study for a clinical trial
      of an anti-PD-1 checkpoint inhibitor in non-small cell lung cancer. You
      have access to: pre-treatment tumour biopsies (bulk RNA-seq and spatial
      transcriptomics), paired blood samples (BCR/TCR-seq), and clinical
      response data.

      Design an analysis strategy that integrates these data types to identify
      predictive biomarkers of response. Which modules from this course inform
      each analysis step?
    answer:
      - "deconvolution"
      - "TME"
      - "spatial"
      - "TCR"
      - "clonal"
      - "neoantigen"
      - "biomarker"
      - "integrative"
    hint: "Combine bulk deconvolution + spatial mapping + TCR expansion + clinical correlation."
    explanation: >
      An integrative analysis strategy: (1) CIBERSORTx deconvolution of bulk
      RNA-seq to estimate CD8⁺, Treg, macrophage fractions (Modules 01, 08);
      (2) spatial transcriptomics to map T cell-tumour proximity and PD-L1
      co-localisation (Module 08); (3) TCR-seq to measure clonal expansion
      and diversity pre/post-treatment (Module 04); (4) correlate all features
      with clinical response using multivariate models; (5) identify candidate
      biomarkers — e.g., high baseline CD8⁺ infiltration + spatial proximity
      + diverse TCR repertoire predicts response. This integrates concepts
      from nearly every module in the course.
    tags: ["case study", "integrative", "biomarker", "immunotherapy"]

  - id: "10_mc_iedb"
    type: "multiple_choice"
    difficulty: "medium"
    question: "The Immune Epitope Database (IEDB) is primarily used for:"
    choices:
      - "A) Storing raw sequencing reads from scRNA-seq experiments"
      - "B) Curating experimentally validated B cell and T cell epitopes and MHC ligands"
      - "C) Hosting phylogenetic trees of pathogens"
      - "D) Providing pre-trained deep learning models for cell type annotation"
    answer: "B"
    hint: "IEDB = Immune Epitope Database. It's a curated repository of epitope data."
    explanation: >
      IEDB (iedb.org) is a comprehensive database of experimentally validated
      immune epitopes — peptides recognised by B cells, T cells, or bound by
      MHC molecules. It also provides analysis tools for epitope prediction,
      population coverage analysis, and conservation analysis. It is a
      cornerstone resource for vaccine design and T cell epitope prediction.
    tags: ["IEDB", "database", "epitope"]

  - id: "10_mc_cell_markers"
    type: "multiple_choice"
    difficulty: "hard"
    question: "In scRNA-seq analysis, you find a cluster expressing CD68, CD163, and MRC1. This cluster most likely represents:"
    choices:
      - "A) CD8+ cytotoxic T cells"
      - "B) B cells"
      - "C) Macrophages (M2-polarised)"
      - "D) Dendritic cells"
    answer: "C"
    hint: "CD68 is a pan-macrophage marker, while CD163 and MRC1 (CD206) indicate M2 polarisation."
    explanation: >
      CD68 is a canonical macrophage marker. CD163 (scavenger receptor) and
      MRC1/CD206 (mannose receptor) are markers of M2-polarised (alternatively
      activated) macrophages, which are associated with anti-inflammatory
      responses, tissue repair, and in tumour contexts, immunosuppression.
      Knowing cell markers is essential for accurate annotation of immune
      cell types in scRNA-seq clustering.
    tags: ["scRNA-seq", "markers", "macrophage"]

  - id: "10_fill_optitype"
    type: "fill_in_the_blank"
    difficulty: "easy"
    question: "____ typing from sequencing data is a critical first step in neoantigen prediction, determining which peptides a patient's MHC molecules can present."
    answer: "HLA"
    hint: "These are the most polymorphic genes in the human genome — each person's alleles determine their peptide presentation repertoire."
    explanation: >
      HLA (Human Leukocyte Antigen) typing determines a patient's MHC alleles,
      which dictate which peptides can be presented to T cells. Tools like
      OptiType, Polysolver, and HLA-HD perform computational HLA genotyping
      from WGS or RNA-seq data. This is essential for neoantigen prediction,
      transplant matching, and understanding autoimmune disease risk.
    tags: ["HLA", "typing", "neoantigen"]

  - id: "10_matching_databases"
    type: "matching"
    difficulty: "hard"
    question: "Match each immunology database to its primary content:"
    left_items:
      - "IEDB"
      - "IMGT"
      - "VDJdb"
      - "ImmPort"
      - "TCIA"
    right_items:
      - "Curated B cell/T cell epitopes and MHC ligand data"
      - "Immunoglobulin and TCR gene nomenclature and sequences"
      - "Curated TCR-epitope associations linking receptors to antigens"
      - "Shared immunology research data repository (NIAID-funded)"
      - "Tumour immune characterisation data for immuno-oncology"
    answer:
      "IEDB": "Curated B cell/T cell epitopes and MHC ligand data"
      "IMGT": "Immunoglobulin and TCR gene nomenclature and sequences"
      "VDJdb": "Curated TCR-epitope associations linking receptors to antigens"
      "ImmPort": "Shared immunology research data repository (NIAID-funded)"
      "TCIA": "Tumour immune characterisation data for immuno-oncology"
    hint: "IEDB = epitopes, IMGT = gene nomenclature, VDJdb = TCR-antigen pairs, ImmPort = shared data, TCIA = tumour immunity."
    explanation: >
      Each database serves a distinct role in computational immunology. IEDB
      catalogues epitope data. IMGT standardises immunoglobulin/TCR gene
      nomenclature. VDJdb links TCR sequences to their cognate antigens.
      ImmPort provides a shared repository for immunology research data.
      TCIA focuses on tumour-immune interactions. Familiarity with these
      resources is essential for any computational immunology project.
    tags: ["databases", "matching"]

  - id: "10_case_repertoire"
    type: "case_study"
    difficulty: "medium"
    question: >
      You analyse TCR-seq data from blood samples of melanoma patients before
      and after anti-PD-1 treatment. Responders show a significant increase in
      the frequency of specific TCR clonotypes post-treatment, while
      non-responders show no clonal expansion. The expanding clones have
      CDR3 sequences that are predicted to bind known melanoma neoantigens.

      What does clonal expansion of neoantigen-reactive TCRs indicate about
      the mechanism of checkpoint therapy? How could this inform patient
      monitoring?
    answer:
      - "clonal expansion"
      - "neoantigen"
      - "TCR"
      - "checkpoint"
      - "antigen-specific"
      - "biomarker"
      - "monitoring"
    hint: "Checkpoint therapy reinvigorates specific anti-tumour T cell clones — their expansion is measurable in blood."
    explanation: >
      Clonal expansion of neoantigen-reactive TCRs indicates that anti-PD-1
      therapy specifically reinvigorates pre-existing tumour-reactive T cells
      rather than generating entirely new responses. The expanding clones are
      antigen-driven (specific CDR3 sequences), confirming that the mechanism
      involves releasing checkpoint-mediated suppression of tumour-specific
      T cells. For patient monitoring, tracking these tumour-reactive TCR
      clonotypes in blood (liquid biopsy) could serve as an early biomarker
      of response — clonal expansion at week 3 predicting clinical response
      at month 3.
    tags: ["case study", "TCR-seq", "repertoire", "checkpoint"]
