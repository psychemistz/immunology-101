exercises:
  - id: "06_mc_aire"
    type: "multiple_choice"
    difficulty: "easy"
    question: "What is the role of the AIRE transcription factor in the thymus?"
    choices:
      - "A) It activates T cells against pathogens"
      - "B) It drives expression of tissue-specific antigens for self-tolerance testing"
      - "C) It promotes antibody class switching"
      - "D) It recruits neutrophils to sites of infection"
    answer: "B"
    hint: "AIRE = Autoimmune Regulator. It helps test T cells against self-antigens they'd normally never see in the thymus."
    explanation: >
      AIRE forces thymic epithelial cells to express proteins normally found
      only in specific organs (e.g., insulin, thyroglobulin). This allows
      developing T cells to be tested against a comprehensive self-antigen
      library. Mutations in AIRE cause autoimmune polyendocrinopathy syndrome
      type 1 (APS-1).
    tags: ["AIRE", "central tolerance", "thymus"]

  - id: "06_mc_anergy"
    type: "multiple_choice"
    difficulty: "easy"
    question: "A T cell that receives TCR stimulation (Signal 1) without co-stimulation (Signal 2) becomes:"
    choices:
      - "A) A memory T cell"
      - "B) A Treg cell"
      - "C) Anergic (functionally unresponsive)"
      - "D) A cytotoxic T cell"
    answer: "C"
    hint: "Authentication without authorisation leads to account lockout."
    explanation: >
      Anergy is a peripheral tolerance mechanism. Self-reactive T cells that
      encounter self-antigen on non-professional APCs (which lack B7
      co-stimulatory molecules) receive Signal 1 without Signal 2, rendering
      them functionally unresponsive. This prevents autoimmune activation.
    tags: ["anergy", "peripheral tolerance"]

  - id: "06_matching_autoimmune"
    type: "matching"
    difficulty: "medium"
    question: "Match each autoimmune disease to its primary target:"
    left_items:
      - "Type 1 diabetes"
      - "Multiple sclerosis"
      - "Graves' disease"
      - "Systemic lupus erythematosus"
    right_items:
      - "Pancreatic β cells (insulin-producing)"
      - "CNS myelin sheaths"
      - "TSH receptor (stimulatory autoantibodies)"
      - "Nuclear antigens (DNA, histones)"
    answer:
      "Type 1 diabetes": "Pancreatic β cells (insulin-producing)"
      "Multiple sclerosis": "CNS myelin sheaths"
      "Graves' disease": "TSH receptor (stimulatory autoantibodies)"
      "Systemic lupus erythematosus": "Nuclear antigens (DNA, histones)"
    hint: "T1D = beta cells, MS = myelin, Graves' = thyroid receptor, SLE = nuclear components."
    explanation: >
      Each autoimmune disease targets specific self-antigens. T1D: CD8⁺ T cells
      destroy insulin-producing β cells. MS: T cells attack myelin. Graves':
      autoantibodies stimulate TSH receptors causing hyperthyroidism. SLE:
      autoantibodies against DNA and nuclear proteins form immune complexes
      affecting multiple organs.
    tags: ["autoimmune", "matching"]

  - id: "06_fill_treg"
    type: "fill_in_the_blank"
    difficulty: "medium"
    question: "Regulatory T cells (Tregs) are characterised by expression of the master transcription factor ____, and they suppress excessive immune responses."
    answer: "FOXP3"
    hint: "This forkhead-box transcription factor is essential for Treg development and function."
    explanation: >
      FOXP3 (Forkhead box P3) is the master transcription factor for Treg
      identity and function. Mutations in FOXP3 cause IPEX syndrome — a fatal
      multi-organ autoimmune disease, demonstrating the critical importance
      of Tregs in maintaining self-tolerance.
    tags: ["Treg", "FOXP3", "tolerance"]

  - id: "06_ordering_tolerance"
    type: "ordering"
    difficulty: "medium"
    question: "Arrange these tolerance mechanisms from earliest (development) to latest (periphery):"
    choices:
      - "V(D)J recombination generates diverse TCRs in the thymus"
      - "Positive selection ensures TCR can bind self-MHC"
      - "AIRE-mediated negative selection removes strongly self-reactive clones"
      - "Surviving T cells export to periphery"
      - "Peripheral anergy inactivates self-reactive escapees"
      - "Tregs actively suppress any remaining autoreactive responses"
    answer:
      - "V(D)J recombination generates diverse TCRs in the thymus"
      - "Positive selection ensures TCR can bind self-MHC"
      - "AIRE-mediated negative selection removes strongly self-reactive clones"
      - "Surviving T cells export to periphery"
      - "Peripheral anergy inactivates self-reactive escapees"
      - "Tregs actively suppress any remaining autoreactive responses"
    hint: "Central (thymus) mechanisms come first, then peripheral (tissue) mechanisms."
    explanation: >
      Tolerance is layered: TCR generation → positive selection → negative
      selection (central) → export → anergy and Treg suppression (peripheral).
      Each layer catches escapees from the previous one, like nested input
      validation.
    tags: ["tolerance", "ordering"]

  - id: "06_case_hla"
    type: "case_study"
    difficulty: "hard"
    question: >
      A GWAS study identifies HLA-DRB1*04:01 as a strong risk allele for
      rheumatoid arthritis (OR = 4.2). You also find that T cells from
      RA patients show oligoclonal expansion targeting citrullinated peptides
      presented by this HLA allele.

      Explain how a specific HLA allele can predispose to autoimmunity.
      What does oligoclonal T cell expansion suggest about the disease mechanism?
    answer:
      - "peptide presentation"
      - "MHC"
      - "self-antigen"
      - "citrullinated"
      - "antigen-driven"
      - "clonal expansion"
      - "autoreactive"
    hint: "Different HLA alleles bind different peptide repertoires. If an allele binds self-peptides well, it can present them to T cells."
    explanation: >
      HLA-DRB1*04:01 has a peptide-binding groove that efficiently presents
      citrullinated self-peptides (modified arginine residues common in
      inflamed joints). This enables CD4⁺ T cells to recognise these modified
      self-antigens as foreign. Oligoclonal T cell expansion indicates that
      the response is antigen-driven (not random inflammation) — specific
      T cell clones are being repeatedly activated by citrullinated peptides,
      driving chronic autoimmune joint inflammation.
    tags: ["case study", "HLA", "GWAS", "RA", "autoimmunity"]

  - id: "06_mc_mimicry"
    type: "multiple_choice"
    difficulty: "medium"
    question: "Molecular mimicry can trigger autoimmunity because:"
    choices:
      - "A) Pathogens directly destroy immune cells"
      - "B) Pathogen epitopes structurally resemble self-antigens, causing cross-reactive immune responses"
      - "C) Pathogens enhance Treg function"
      - "D) Pathogens block MHC expression on all cells"
    answer: "B"
    hint: "The pathogen's molecular 'signature' is so similar to a self-protein that immune cells attack both."
    explanation: >
      Molecular mimicry occurs when pathogen-derived epitopes share structural
      similarity with host proteins. Immune cells activated against the pathogen
      cross-react with the similar self-antigen, triggering autoimmunity.
      Examples include Streptococcus and rheumatic heart disease (streptococcal
      M protein mimics cardiac myosin), and EBV and multiple sclerosis.
    tags: ["molecular mimicry", "autoimmunity"]

  - id: "06_mc_receptor_editing"
    type: "multiple_choice"
    difficulty: "hard"
    question: "During B cell development, a self-reactive immature B cell can be rescued through receptor editing. What does this involve?"
    choices:
      - "A) The B cell switches from IgM to IgG production"
      - "B) The B cell rearranges its light chain genes to change its receptor specificity"
      - "C) The B cell migrates to the thymus for positive selection"
      - "D) The B cell undergoes somatic hypermutation to reduce self-reactivity"
    answer: "B"
    hint: "Editing = retry with new parameters. The cell gets a second chance by rearranging a new light chain."
    explanation: >
      Receptor editing allows self-reactive immature B cells in the bone marrow
      to undergo secondary light chain rearrangement, generating a new BCR
      with different antigen specificity. If the new receptor is no longer
      self-reactive, the cell survives. If editing fails, the cell undergoes
      clonal deletion (apoptosis). This is a central tolerance mechanism
      unique to B cells.
    tags: ["receptor editing", "B cell", "central tolerance"]

  - id: "06_fill_privileged"
    type: "fill_in_the_blank"
    difficulty: "easy"
    question: "The brain, eyes, and testes are immune-____ sites where physical barriers limit immune cell access to prevent inflammatory damage."
    answer: "privileged"
    hint: "These sites are 'privileged' with limited immune access — like an air-gapped network."
    explanation: >
      Immune-privileged sites have physical barriers (e.g., blood-brain barrier,
      blood-testis barrier, blood-retinal barrier) that restrict immune cell
      entry. This prevents inflammation-mediated damage to sensitive tissues.
      However, if these barriers are breached (e.g., by trauma or infection),
      exposure of previously hidden self-antigens can trigger autoimmune
      responses.
    tags: ["immune privilege", "tolerance"]

  - id: "06_matching_autoimmune_factors"
    type: "matching"
    difficulty: "hard"
    question: "Match each contributing factor in autoimmunity to its mechanism:"
    left_items:
      - "HLA genetic susceptibility"
      - "Molecular mimicry"
      - "Bystander activation"
      - "Defective Tregs"
    right_items:
      - "Specific MHC alleles bind and present self-peptides more efficiently"
      - "Pathogen epitopes resemble self-antigens, causing cross-reactive T cells"
      - "Tissue inflammation exposes hidden self-antigens to the immune system"
      - "Reduced suppressive function allows autoreactive cells to expand"
    answer:
      "HLA genetic susceptibility": "Specific MHC alleles bind and present self-peptides more efficiently"
      "Molecular mimicry": "Pathogen epitopes resemble self-antigens, causing cross-reactive T cells"
      "Bystander activation": "Tissue inflammation exposes hidden self-antigens to the immune system"
      "Defective Tregs": "Reduced suppressive function allows autoreactive cells to expand"
    hint: "Each factor breaks tolerance at a different level: presentation, cross-reactivity, exposure, or suppression."
    explanation: >
      Autoimmunity typically requires multiple contributing factors. HLA alleles
      determine which self-peptides are presented. Molecular mimicry causes
      cross-reactivity between pathogen and self. Bystander activation from
      tissue damage exposes hidden antigens. Defective Tregs fail to suppress
      autoreactive clones. Most autoimmune diseases involve a combination
      of genetic predisposition and environmental triggers.
    tags: ["autoimmunity", "risk factors", "matching"]

  - id: "06_case_ipex"
    type: "case_study"
    difficulty: "medium"
    question: >
      A newborn presents with severe multi-organ autoimmunity: type 1 diabetes,
      thyroiditis, and inflammatory bowel disease within the first year of life.
      Genetic testing reveals a loss-of-function mutation in the FOXP3 gene.

      What is the diagnosis? Explain why loss of FOXP3 leads to multi-organ
      autoimmunity.
    answer:
      - "IPEX"
      - "Treg"
      - "FOXP3"
      - "suppression"
      - "tolerance"
      - "regulatory"
    hint: "FOXP3 is the master transcription factor for Tregs. Without it, there is no immune suppression."
    explanation: >
      This is IPEX syndrome (Immune dysregulation, Polyendocrinopathy,
      Enteropathy, X-linked). FOXP3 is the master transcription factor
      required for Treg development and function. Without functional Tregs,
      the immune system lacks its primary peripheral tolerance mechanism —
      autoreactive T cells that escaped thymic selection have no suppressive
      counterbalance. The result is widespread, aggressive autoimmunity
      affecting multiple organs simultaneously. This demonstrates that
      Tregs are essential for maintaining self-tolerance throughout life.
    tags: ["case study", "IPEX", "FOXP3", "Treg"]
